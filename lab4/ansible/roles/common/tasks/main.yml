---
- name: Створення користувача teacher
  user:
    name: teacher
    password: "{{ '12345678' | password_hash('sha512') }}"
    groups: sudo
    append: yes
    shell: /bin/bash

- name: Створення директорії для gradebook
  file:
    path: /home/student
    state: directory
    mode: '0755'

- name: Створення файлу gradebook
  copy:
    dest: /home/student/gradebook
    content: "41\n"
